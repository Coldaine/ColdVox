[package]
name = "coldvox-stt"
version = "0.1.0"
edition = "2021"
description = "Speech-to-text abstraction layer for ColdVox"

[dependencies]
tokio = { version = "1.35", features = ["sync", "macros", "time"] }
tracing = "0.1"
parking_lot = "0.12"
async-trait = "0.1"
thiserror = "2.0"
dirs = "5.0"
serde = { version = "1.0", features = ["derive"] }
coldvox-foundation = { path = "../coldvox-foundation" }

# Candle ML framework dependencies (optional, enabled with whisper feature)
candle-core = { version = "0.7", optional = true }
candle-nn = { version = "0.7", optional = true }
candle-transformers = { version = "0.7", optional = true }
tokenizers = { version = "0.20", optional = true }
hf-hub = { version = "0.3", optional = true, features = ["tokio"] }
anyhow = { version = "1.0", optional = true }
byteorder = { version = "1.5", optional = true }
rand = { version = "0.8", optional = true }
serde_json = { version = "1.0", optional = true }

[features]
default = []
parakeet = []
whisper = ["candle-core", "candle-nn", "candle-transformers", "tokenizers", "hf-hub", "anyhow", "byteorder", "rand", "serde_json"]
coqui = []
leopard = []
silero-stt = []
