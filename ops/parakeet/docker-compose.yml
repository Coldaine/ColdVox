services:
  # Canonical ColdVox wave-1 HTTP STT container profile.
  # Pattern source: D:\LocalLargeLanguageModels\parakeet-stt\docker-compose.yml
  parakeet-cpu:
    # Pinned by digest for supply-chain integrity; bump deliberately after verifying upstream changes.
    # Tag at time of pin: ghcr.io/achetronic/parakeet:latest
    image: ghcr.io/achetronic/parakeet@sha256:636a2dd1fb16a9624af0b4b3cded0231919f5d3124d43da5b4377359ed42c002
    ports:
      - "5092:5092"
    volumes:
      # Persist downloaded ONNX/Hugging Face model assets across restarts.
      - parakeet-models:/app/models
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/5092 && printf 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional GPU-backed Parakeet comparison profile.
  # Upstream image serves on container port 8000 and is not the canonical wave-1 default.
  parakeet-gpu:
    profiles: ["gpu"]
    image: marcpope/parakeet-api:latest
    ports:
      - "8200:8000"
    environment:
      DEVICE: cuda
      MODEL_PRECISION: fp16
    gpus: all
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').getcode()==200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  parakeet-models:
    name: parakeet-models
