---
name: "Agentic Evidence Assessor (Shadow Mode)"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main

# Shadow mode: this job is advisory only. It never blocks a PR.
# All merge decisions remain with human reviewers.

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: evidence-assessor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assess-evidence:
    name: "Evidence Assessor (shadow)"
    runs-on: ubuntu-latest
    # Never fail the PR — this is a shadow reviewer, not a gate.
    continue-on-error: true

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          # fetch-depth: 0 is REQUIRED for git diff origin/base...HEAD to work.
          # Shallow clones (depth: 1) lack the common ancestor needed for three-dot diffs.
          fetch-depth: 0
          # Explicitly fetch the base branch so origin/base_ref is available.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Ensure base branch is fetched
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=0 2>/dev/null || \
          git fetch origin "${{ github.event.pull_request.base.ref }}" || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Autonomous Gemini Agent
        id: assess
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY secret is not configured — skipping assessment."
            echo "**⚠️ Evidence Assessor skipped:** \`GEMINI_API_KEY\` secret not configured." >> /tmp/report.md
            exit 0
          fi

          echo "=== Running Gemini autonomous agent ==="
          # Create an instructions file for the agent
          cat .github/prompts/evidence-assessor.md > /tmp/agent_instructions.md
          echo -e "\n## PR Context:\n**Title:** $PR_TITLE\n**Body:** $PR_BODY\n**Base Branch:** origin/$BASE_REF\n" >> /tmp/agent_instructions.md
          
          # Run Gemini CLI in autonomous YOLO mode to actively investigate the repository.
          # It has a high turn limit to allow for deep exploration.
          npx --yes @google/gemini-cli \
            --model gemini-2.0-flash \
            --api_key "${GEMINI_API_KEY}" \
            --approval-mode=yolo \
            -p "You are the Agentic Evidence Assessor. Read your instructions from /tmp/agent_instructions.md. Investigate the current workspace to review the PR against the base branch (origin/$BASE_REF). Do whatever searches, file reads, or command runs you need. Finally, write your markdown report to /tmp/report.md. Stop when the report is written." || {
              echo "Gemini CLI exited with an error code. Check the action logs."
            }

          # Ensure report exists even if the agent failed to create it
          if [ ! -f /tmp/report.md ]; then
              echo "**⚠️ Evidence Assessor error:** Agent failed to write to /tmp/report.md." > /tmp/report.md
          fi

      - name: Write assessment to Step Summary
        if: always()
        run: |
          {
            echo "## 🤖 Agentic Evidence Assessor (Shadow Mode)"
            echo ""
            echo "> **Shadow Mode**: This report is non-blocking. It is advisory only and does not gate merges."
            echo "> Reviewers should read this before approving, but merge decisions remain with humans."
            echo ""
            echo "---"
            echo ""
            if [ -f /tmp/report.md ]; then
              cat /tmp/report.md
            else
              echo "_No report generated — assessor step did not complete._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
