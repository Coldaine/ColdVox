name: Gate main branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from tauri-base
        if: github.head_ref != 'tauri-base'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "::error::PRs to main must come from tauri-base, not '$HEAD_REF'"
          exit 1
