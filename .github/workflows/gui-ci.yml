---
name: GUI CI

on:
  push:
    branches:
      - main
    paths:
      - "crates/coldvox-gui/**"
      - ".github/workflows/gui-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/coldvox-gui/**"
      - ".github/workflows/gui-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gui-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (lint/test/e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates/coldvox-gui
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/coldvox-gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: crates/coldvox-gui/playwright-report/
          retention-days: 7

  rust-check:
    name: Tauri Rust check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: ". -> target"

      - name: Install Tauri Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: cargo check -p coldvox-gui
        run: cargo check -p coldvox-gui --locked

      - name: cargo test -p coldvox-gui
        run: cargo test -p coldvox-gui --locked

  windows-bundle:
    name: Windows MSI bundle
    runs-on: windows-latest
    needs: [frontend, rust-check]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: crates/coldvox-gui
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/coldvox-gui/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: ". -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri build (MSI + NSIS)
        run: npm run tauri -- build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coldvox-gui-windows-bundle
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 14
          if-no-files-found: warn
