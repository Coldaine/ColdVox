# Windows live override for the canonical HTTP/container Parakeet path.
# Use via `COLDVOX_CONFIG_PATH=config/windows-parakeet.toml`.
#
# The normal startup path still discovers `config/default.toml` plus `config/plugins.json`.
# This override keeps Windows launchers on the canonical http-remote profile while
# enabling Enigo for text injection.

[injection]
allow_enigo = true

[stt]
preferred = "http-remote"
fallbacks = []
require_local = false
language = "en"
